openapi: "3.0.0"
info:
  title: Product API
  version: "1.0.0"

paths:
  /products:
    get:
      summary: Get products
      operationId: products.get_all
      responses:
        "200":
          description: Success
    post:
      summary: Create new product
      operationId: products.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created successfully

  /products/{product_id}:
    get:
      summary: Get product
      operationId: products.get_one
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
        "404":
          description: Not found
    put:
      summary: Update product
      operationId: products.update
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated successfully
    delete:
      summary: Delete product
      operationId: products.delete
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted successfully

components:
  schemas:
    ProductInput:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
        price:
          type: number
          minimum: 0
        description:
          type: string
          default: ""
        stock:
          type: integer
          default: 0
          minimum: 0