openapi: 3.0.0
info:
  title: Book Management API
  description: |-
    Book Management API

    API quản lý sách đơn giản viết bằng Flask.
    Hỗ trợ tìm kiếm, lọc theo thể loại, phân trang và CRUD.

    Nguồn: app.py (Flask + Flasgger)
    In-memory store — dữ liệu reset khi restart server.
    Không có authentication.
  version: 0.0.0
tags:
  - name: books
paths:
  /:
    get:
      operationId: Root_ping
      description: |-
        Ping endpoint. Trả về chuỗi cố định.
        Không liên quan đến base path /v1.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                required:
                  - msg
  /v1/books:
    get:
      operationId: Books_list
      description: |-
        Lấy danh sách sách.

        Thứ tự xử lý filter trong app.py:
        1. Validate page, limit (parse int, clamp)
        2. Validate genre (nếu có)
        3. Filter theo genre (so sánh ==)
        4. Filter theo q (substring, case-insensitive, trên title VÀ author)
        5. Paginate
      parameters:
        - $ref: '#/components/parameters/PaginationParams.page'
        - $ref: '#/components/parameters/PaginationParams.limit'
        - name: genre
          in: query
          required: false
          description: |-
            Lọc chính xác theo thể loại (b["genre"] == genre).
            Nếu giá trị không thuộc Genre enum → 400 INVALID_PARAM.
          schema:
            $ref: '#/components/schemas/Genre'
          explode: false
        - name: q
          in: query
          required: false
          description: |-
            Tìm kiếm trong title hoặc author.
            Strip whitespace, lowercase, substring match.
            Bỏ trống hoặc bỏ qua = không filter.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookListResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - books
    post:
      operationId: Books_create
      description: |-
        Tạo sách mới.

        `id` = `len(BOOKS) + 1` — không an toàn với concurrent requests,
        nhưng đây là in-memory demo.

        Thiếu `title`, `author`, hoặc `genre` trong body sẽ raise
        Python KeyError → HTTP 500 (không có validation ở app layer).
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
  /v1/books/{bookId}:
    get:
      operationId: ById_get
      description: |-
        Lấy thông tin chi tiết một cuốn sách.

        book_id trong URL là string, app.py dùng BOOKS.get(book_id) —
        cần truyền đúng kiểu integer ID khi lookup.
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - books
    put:
      operationId: ById_update
      description: |-
        Thay thế toàn bộ dữ liệu sách (PUT semantics).

        Các field optional trong UpdateBookRequest sẽ fallback về
        giá trị cũ của sách nếu không có trong body:
        isbn       → data.get("isbn", book.get("isbn"))
        publishedYear → data.get("publishedYear", book.get("publishedYear"))
        price      → data.get("price", book.get("price"))
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookRequest'
    delete:
      operationId: ById_delete
      description: |-
        Xóa sách khỏi in-memory store.
        Response 204 không có body (trả về empty string "").
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      tags:
        - books
components:
  parameters:
    PaginationParams.limit:
      name: limit
      in: query
      required: false
      description: |-
        Số bản ghi/trang. Clamp vào [1, 100].
        Non-integer → 400 INVALID_PARAM.
      schema:
        type: integer
        format: int32
        default: 20
      explode: false
    PaginationParams.page:
      name: page
      in: query
      required: false
      description: |-
        Số trang. Clamp bằng max(1, page) — giá trị < 1 tự động thành 1.
        Non-integer → 400 INVALID_PARAM.
      schema:
        type: integer
        format: int32
        default: 1
      explode: false
  schemas:
    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: |-
            Mã lỗi định danh. Các giá trị có thể:
            - INVALID_PARAM: query param sai
            - BAD_REQUEST: body không phải JSON
            - BOOK_NOT_FOUND: không tìm thấy sách
            - NOT_FOUND: route không tồn tại
            - METHOD_NOT_ALLOWED: method không hỗ trợ
            - INTERNAL_ERROR: lỗi server
        message:
          type: string
          description: Mô tả lỗi. Có thể là string rỗng với lỗi từ errorhandler.
      description: |-
        Cấu trúc lỗi chuẩn từ hàm make_error() trong app.py.

        Các error handler 404/405/500 trả về message rỗng "".
        Các lỗi business logic có message mô tả cụ thể.
    Book:
      type: object
      required:
        - id
        - title
        - author
        - genre
      properties:
        id:
          type: integer
          format: int32
          description: |-
            ID tự tăng, do server gán: len(BOOKS) + 1.
            Readonly — không truyền khi tạo/cập nhật.
          readOnly: true
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
          nullable: true
          description: Có thể null nếu không cung cấp khi tạo.
        genre:
          $ref: '#/components/schemas/Genre'
        publishedYear:
          type: integer
          format: int32
          nullable: true
          description: Năm xuất bản. Có thể null.
        price:
          type: number
          format: double
          nullable: true
          description: Giá sách. Có thể null.
      description: Một cuốn sách trong hệ thống.
    BookListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Book'
        pagination:
          $ref: '#/components/schemas/Pagination'
      description: Response của GET /v1/books.
    CreateBookRequest:
      type: object
      required:
        - title
        - author
        - genre
      properties:
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        genre:
          $ref: '#/components/schemas/Genre'
        publishedYear:
          type: integer
          format: int32
        price:
          type: number
          format: double
      description: |-
        Body để tạo sách mới (POST /v1/books).

        QUAN TRỌNG: `title`, `author`, `genre` là bắt buộc theo logic app.py
        (truy cập trực tiếp data["title"] v.v.). Thiếu các field này sẽ gây
        KeyError → HTTP 500 vì không có validation tại tầng app.
    Genre:
      type: string
      enum:
        - fiction
        - non-fiction
        - sci-fi
        - history
        - biography
      description: |-
        Thể loại sách hợp lệ.
        Tương ứng với VALID_GENRES = {"fiction", "non-fiction", "sci-fi", "history", "biography"}
        trong app.py. GET /v1/books trả về 400 nếu genre không thuộc tập này.
    Pagination:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
          format: int32
          description: 'Trang hiện tại (input page sau khi clamp: max(1, page)).'
        limit:
          type: integer
          format: int32
          description: Số bản ghi/trang (input limit sau khi clamp vào [1, 100]).
        total:
          type: integer
          format: int32
          description: Tổng số sách sau khi áp dụng filter genre và q.
        totalPages:
          type: integer
          format: int32
          description: max(1, ceil(total / limit))
      description: Metadata phân trang trả về cùng BookListResponse.
    UpdateBookRequest:
      type: object
      required:
        - title
        - author
        - genre
      properties:
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
          description: Nếu bỏ qua, giữ giá trị cũ của sách.
        genre:
          $ref: '#/components/schemas/Genre'
        publishedYear:
          type: integer
          format: int32
          description: Nếu bỏ qua, giữ giá trị cũ của sách.
        price:
          type: number
          format: double
          description: Nếu bỏ qua, giữ giá trị cũ của sách.
      description: |-
        Body để cập nhật sách (PUT /v1/books/{book_id}).

        PUT thay thế toàn bộ — `title`, `author`, `genre` bắt buộc.
        `isbn`, `publishedYear`, `price` optional: server giữ nguyên
        giá trị cũ nếu không truyền (data.get("isbn", book.get("isbn"))).
servers:
  - url: http://localhost:5000
    description: Local development
    variables: {}
