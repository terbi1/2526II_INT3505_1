          type: string
        publishedYear:
          description: Giữ giá trị cũ nếu không truyền
          example: 1965
          type: number
        price:
          description: Giữ giá trị cũ nếu không truyền
          example: 14.99
          type: number
      required:
      - author
      - genre
      - title
      type: object
    Pagination:
      properties:
        page:
          description: Trang hiện tại
          example: 1
          type: number
        limit:
          description: Số bản ghi mỗi trang (clamp 1–100)
          example: 20
          type: number
        total:
          description: Tổng số sách sau khi filter
          example: 5
          type: number
        totalPages:
          description: "max(1, ceil(total / limit))"
          example: 1
          type: number
      type: object
    ErrorResponse:
      properties:
        code:
          example: BOOK_NOT_FOUND
          type: string
        message:
          example: Cannot find book with this id
          type: string
