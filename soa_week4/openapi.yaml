openapi: "3.0.4"

info:
  title: Book Management API
  description: |
    A simple CRUD API for managing a book collection.
    Built to demonstrate OpenAPI Specification with Flasgger.
  version: "1.0.0"
  contact:
    name: API Support
    email: support@bookapi.dev

servers:
  - url: http://127.0.0.1:5000/v1
  - url: https://2526-ii-int-3505-1-8ensn3pjp-23020166-7634s-projects.vercel.app/v1

tags:
  - name: Books
    description: Book collection management

paths:

  /v1/books:

    get:
      tags: [Books]
      summary: List all books
      description: Returns a paginated list of books with optional filtering by genre and keyword search.
      operationId: listBooks
      parameters:
        - name: page
          in: query
          description: Page number (starts at 1)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of books per page (max 100)
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: genre
          in: query
          description: Filter by genre
          required: false
          schema:
            type: string
            enum: [fiction, non-fiction, sci-fi, history, biography]
        - name: q
          in: query
          description: Search by title or author
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Book"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
              example:
                data:
                  - id: 1
                    title: Dune
                    author: Frank Herbert
                    isbn: "978-0-441-01359-8"
                    genre: sci-fi
                    publishedYear: 1965
                    price: 14.99
                pagination:
                  page: 1
                  limit: 20
                  total: 5
                  totalPages: 1
        "400":
          $ref: "#/components/responses/BadRequest"

    post:
      tags: [Books]
      summary: Create a new book
      description: Add a new book to the collection.
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
            example:
              title: Dune
              author: Frank Herbert
              isbn: "978-0-441-01359-8"
              genre: sci-fi
              publishedYear: 1965
              price: 14.99
      responses:
        "201":
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/books/{book_id}:

    parameters:
      - name: book_id
        in: path
        required: true
        description: The integer ID of the book
        schema:
          type: integer
          example: 1

    get:
      tags: [Books]
      summary: Get a book by ID
      description: Returns the full details of a single book.
      operationId: getBook
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Books]
      summary: Update a book
      description: Fully replace the data of an existing book.
      operationId: updateBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
            example:
              title: Dune Messiah
              author: Frank Herbert
              genre: sci-fi
              publishedYear: 1969
              price: 13.99
      responses:
        "200":
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Books]
      summary: Delete a book
      description: Remove a book from the collection by ID.
      operationId: deleteBook
      responses:
        "204":
          description: Deleted successfully (no response body)
        "404":
          $ref: "#/components/responses/NotFound"

components:

  schemas:

    Book:
      type: object
      description: Full book model returned by the API
      properties:
        id:
          type: integer
          readOnly: true
          description: Auto-incremented book ID
          example: 1
        title:
          type: string
          example: Dune
        author:
          type: string
          example: Frank Herbert
        isbn:
          type: string
          example: "978-0-441-01359-8"
        genre:
          type: string
          enum: [fiction, non-fiction, sci-fi, history, biography]
          example: sci-fi
        publishedYear:
          type: integer
          example: 1965
        price:
          type: number
          format: float
          example: 14.99

    BookInput:
      type: object
      description: Request body for creating or updating a book
      required: [title, author, genre]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Dune
        author:
          type: string
          example: Frank Herbert
        isbn:
          type: string
          pattern: "^[0-9-]{10,17}$"
          example: "978-0-441-01359-8"
        genre:
          type: string
          enum: [fiction, non-fiction, sci-fi, history, biography]
          example: sci-fi
        publishedYear:
          type: integer
          minimum: 1000
          maximum: 2100
          example: 1965
        price:
          type: number
          minimum: 0
          example: 14.99

    Pagination:
      type: object
      description: Pagination metadata
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 5
        totalPages:
          type: integer
          example: 1

    Error:
      type: object
      description: Standard error response
      properties:
        code:
          type: string
          example: BOOK_NOT_FOUND
        message:
          type: string
          example: Cannot find book with this id

  responses:

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: BOOK_NOT_FOUND
            message: Cannot find book with this id

    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: BAD_REQUEST
            message: Request body must be JSON